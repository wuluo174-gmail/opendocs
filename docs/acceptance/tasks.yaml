    - 报告显示通过、失败、阻塞与风险项
    - scripts/run_static_checks.py 可执行
    - 覆盖率与静态检查报告可生成
  - id: S11-T03
    title: 运行性能基准并对搜索、引用定位、冷启动做调优
    done_when:
    - NFR-001 到 NFR-005 有量化结果
    - 关键瓶颈有记录与已知权衡
  - id: S11-T04
    title: 完成 PyInstaller 打包、三平台发布目录策略与跨平台回归矩阵
    done_when:
    - 至少当前平台产出可运行发布目录
    - 三平台构建流程与依赖记录完整
    - 跨平台核心用例结果完整，或明确记录待验证矩阵与阻塞项
  - id: S11-T05
    title: 整理用户文档、隐私说明、故障排查与最终交付报告
    done_when:
    - README、用户手册、架构说明、配置示例、隐私说明、故障排查、验收报告完整
    - 整体交付条件满足
  test_commands:
  - ./.venv/bin/python scripts/generate_fixture_corpus.py --profile acceptance
  - ./.venv/bin/python scripts/run_static_checks.py
  - ./.venv/bin/pytest --cov=src/opendocs --cov-report=term-missing
  - ./.venv/bin/python scripts/run_acceptance.py --suite full
  - ./.venv/bin/pytest tests/performance -q
  - ./.venv/bin/pyinstaller packaging/opendocs.spec
  exit_criteria:
  - 验收脚本全绿
  - 覆盖率、静态检查与关键交付文档证据齐备
  - 跨平台核心用例与路径差异验证结果齐备，或明确待验证矩阵与阻塞项
  - 至少当前平台产出可运行发布目录，且三平台构建策略明确
  - 形成最终交付包
  acceptance_refs:
  - TC-019
  - TC-020
  - TC-021
  risk_watch_items:
  - 不要把验收脚本写成演示脚本
  - 无法在当前主机全量验证跨平台时，必须留下构建矩阵与待验证项
acceptance_authority:
  document: docs/acceptance/acceptance_cases.md
  rule: 该文件主导最终通过/失败判定；本文件只负责施工排序、阶段门禁与阶段命令。
