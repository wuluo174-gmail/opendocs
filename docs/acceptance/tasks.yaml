  - tests/e2e/ui/
  tasks:
  - id: S9-T01
    title: 实现初始化向导与设置页
    done_when:
    - 可配置根目录、模式、提供商、首次索引
  - id: S9-T02
    title: 实现搜索与问答主界面、结果列表、引用面板、原文预览
    done_when:
    - 答案旁边能直接看到引用与原文片段
    - 用户可点击跳转定位
  - id: S9-T03
    title: 实现洞察、归档预览、生成编辑器、记忆管理、审计回滚页面
    done_when:
    - 核心业务均能通过 UI 完成
    - 高风险操作界面中有风险提示与确认
  - id: S9-T04
    title: 整理 UI 与应用服务边界，禁止 UI 直连底层存储和提供商
    done_when:
    - UI 只通过应用服务层触发业务
  - id: S9-T05
    title: 补齐 pytest-qt UI 冒烟与关键交互测试
    done_when:
    - 引用跳转、预览确认、回滚入口、设置切换有自动化测试
  test_commands:
  - pytest tests/e2e/ui -q
  - pytest tests/e2e/test_desktop_demo.py -q
  exit_criteria:
  - 核心业务均可通过 UI 完成
  - 高风险操作均有预览和确认
  - 界面可完成端到端演示
  acceptance_refs:
  - TC-018
  - TC-019
  - TC-020
  risk_watch_items:
  - 不要把复杂业务规则散落进 QWidget 事件处理器
  - 界面必须符合‘识别优于回忆’原则
- id: S10
  name: 隐私模式、提供商适配与安全收口
  status: pending
  depends_on:
  - S9
  objective: 实现提供商路由、Local-Only / Hybrid / Cloud-Assisted 模式、keyring、外发最小化与外发审计。
  traceability:
  - FR-012
  - FR-013
  - FR-014
  - Stage10
  - NFR-014
  - NFR-015
  - NFR-016
  modules:
  - provider
  - routing
  - privacy
  - keyring
  - audit
  deliverables:
  - src/opendocs/provider/base.py
  - src/opendocs/provider/ollama_adapter.py
  - src/opendocs/provider/cloud_adapters.py
  - src/opendocs/app/provider_service.py
  - tests/integration/provider/
  tasks:
  - id: S10-T01
    title: 实现 Ollama、本地优先路由与云端适配抽象
    done_when:
    - ProviderService 可列出、测试、路由提供商
    - 本地和云端适配层保持统一接口
  - id: S10-T02
    title: 实现 Local-Only / Hybrid / Cloud-Assisted 模式与外发最小化策略
    done_when:
    - Local-Only 下 0 外发
    - Cloud-Assisted 仅发送最小必要证据片段
  - id: S10-T03
    title: 集成 keyring 与配置覆盖机制
    done_when:
    - API Key 不落盘到明文配置与日志
    - 缺失密钥时提示清晰
  - id: S10-T04
    title: 实现外发审计、网络模式可视化与安全测试
    done_when:
    - 每次外发都记录目标模型、片段摘要、文档数、字符/Token 量
    - 界面可查看当前网络模式
  - id: S10-T05
    title: 补齐 Local-Only 网络探针、外发最小化、密钥脱敏测试
    done_when:
    - 本地模式网络为 0
    - 日志和异常中无明文密钥
  test_commands:
  - pytest tests/integration/provider -q
  - pytest tests/integration/security -q
  exit_criteria:
  - 纯本地模式 0 外发
  - 云端模式可查看外发摘要
  - 密钥不落盘日志
  acceptance_refs:
  - TC-015
  - TC-016
  - TC-017
  risk_watch_items:
  - 任何外发都必须可解释、可审计
  - 本地模式测试不能只靠代码阅读，必须有网络探针或 monkeypatch 断言
- id: S11
  name: 性能调优、打包与验收
  status: pending
  depends_on:
  - S10
  objective: 完成黄金语料、验收脚本、性能基准、打包产物、用户文档与最终交付报告。
  traceability:
  - FR-016
  - Sec17
  - Sec18
  - Sec19
  - Stage11
  - NFR-001~023
  modules:
  - fixtures
  - acceptance
  - performance
  - packaging
  - docs
  deliverables:
  - scripts/generate_fixture_corpus.py
  - scripts/run_acceptance.py
  - tests/performance/
  - packaging/
  - docs/acceptance/
  - docs/user-guide.md
  tasks:
  - id: S11-T01
    title: 实现黄金语料与查询集生成器
    done_when:
    - 生成至少满足 18.1 的语料构成
    - 包含冲突、破损、极短文档与多命名风格样本
  - id: S11-T02
    title: 实现一键验收脚本、JSON/Markdown 报告与用例映射
    done_when:
    - run_acceptance.py 能按 case ID 执行
    - 报告显示通过/失败/风险项
  - id: S11-T03
    title: 运行性能基准并对搜索、引用定位、冷启动做调优
    done_when:
    - NFR-001~005 有量化结果
    - 关键瓶颈有记录与已知权衡
  - id: S11-T04
    title: 完成 PyInstaller 打包与三平台发布目录策略
    done_when:
    - 至少当前平台产出可运行发布目录
    - 三平台构建流程与依赖记录完整
  - id: S11-T05
    title: 整理用户文档、故障排查、隐私说明、最终交付报告
    done_when:
    - README、用户手册、配置示例、验收报告完整
    - 整体交付 DoD 满足
  test_commands:
  - python scripts/generate_fixture_corpus.py --profile acceptance
  - python scripts/run_acceptance.py --suite full
  - pytest tests/performance -q
  - pyinstaller packaging/opendocs.spec
  exit_criteria:
  - 验收脚本全绿
  - 三平台至少产出发布目录
  - 形成最终交付包
  acceptance_refs:
  - TC-019
  - TC-020
  risk_watch_items:
  - 不要把验收脚本写成只会‘看起来通过’的演示脚本
  - 跨平台若无法在当前主机全量验证，必须留出构建矩阵与待验证项，而不是跳过
acceptance_authority:
  document: acceptance_cases.md
  rule: 该文件主导最终通过/失败判定；tasks.yaml 负责施工排序与阶段门禁。
