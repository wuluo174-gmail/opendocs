schema_version: '1.0'
project:
  name: OpenDocs
  type: desktop-ai-document-assistant
  language: zh-CN
  generated_on: '2026-04-09'
  baseline_spec: docs/specs/OpenDocs_工程实施主规范_v1.0.md
  authority_files:
  - docs/specs/OpenDocs_工程实施主规范_v1.0.md
  - docs/acceptance/tasks.yaml
  - docs/acceptance/acceptance_cases.md
  - docs/prompts/codex_operator_prompt.md
  - AGENTS.md
  bridge_files:
  - docs/guides/OpenDocs_Codex_阶段提示词清单.md
  - docs/guides/OpenDocs_Codex_从零到一小白执行手册.md
document_role:
  owner: docs/acceptance/tasks.yaml
  purpose: 只定义阶段排序、阶段门禁、阶段交付物、测试命令、出口条件与阶段状态。
  non_goals:
  - 不定义产品、系统、数据模型与完整 FR/NFR
  - 不定义最终通过/失败判定
  - 不定义代理启动提示词与桥梁模板
authority_refs:
  precedence_ref: docs/specs/OpenDocs_工程实施主规范_v1.0.md（0.3 规则裁决顺序）
  responsibilities_ref: docs/specs/OpenDocs_工程实施主规范_v1.0.md（0.4 治理文件职责矩阵）
  migration_strategy_ref: docs/specs/OpenDocs_工程实施主规范_v1.0.md（2.3 遗留实现改造策略）
  repo_discipline_ref: AGENTS.md
stage_status_contract:
  owner: docs/acceptance/tasks.yaml
  selection_rule: 默认当前阶段 = 最早一个 status != completed 的阶段；如人类明确指定阶段，以人类指定为准。
  governance_refactor_rule: 治理重构不改变任何阶段 status，也不构成阶段通过证据。
execution_contract:
  strict_phase_order: true
  stop_on_failed_gate: true
  must_run_stage_test_commands: true
  must_report_migration_strategy: true
  governance_refactors_do_not_change_stage_status: true
stage_governance_contract:
  owner: docs/acceptance/tasks.yaml
  required_fields:
  - implementation_basis
  - legacy_code_policy
  - delivery_mode
  allowed_values:
    implementation_basis:
    - spec_first
    legacy_code_policy:
    - reference_only_requires_refactor
    delivery_mode:
    - refactor_against_legacy
    - normal_spec_delivery
  interpretation:
    implementation_basis:
      spec_first: 当前阶段实现与验收判定以主规范、当前阶段门禁与验收映射为准，不以现有实现倒逼规范。
    legacy_code_policy:
      reference_only_requires_refactor: 仓库中已存在的代码、脚本、测试与阶段报告只能作参考素材；与现规范冲突时，必须重构而不是放宽规范。
    delivery_mode:
      refactor_against_legacy: 仅用于 S0-S5；这些阶段已有旧实现沉淀，默认先判断复用、旁路新建、入口切换与旧实现收口。
      normal_spec_delivery: 用于 S6-S11；按现规范正常交付，不额外延续 S0-S5 的历史实现路径。
shared_contract_refs:
  source_root_contract_ref: docs/specs/OpenDocs_工程实施主规范_v1.0.md（5.A SourceRoot）
  scan_run_contract_ref: docs/specs/OpenDocs_工程实施主规范_v1.0.md（5.B ScanRun）
  index_artifact_contract_ref: docs/specs/OpenDocs_工程实施主规范_v1.0.md（5.C IndexArtifact）
  task_event_contract_ref: docs/specs/OpenDocs_工程实施主规范_v1.0.md（5.5 TaskEvent 最小字段契约）
  memory_policy_ref: docs/specs/OpenDocs_工程实施主规范_v1.0.md（5.6 MemoryItem 与 5.9 数据不变量）
  file_operation_plan_contract_ref: docs/specs/OpenDocs_工程实施主规范_v1.0.md（5.7 FileOperationPlan）
  final_acceptance_ref: docs/acceptance/acceptance_cases.md
default_commands:
  bootstrap: ./.venv/bin/python scripts/bootstrap_dev.py
  static_check: ./.venv/bin/python scripts/run_static_checks.py
  unit_test: ./.venv/bin/pytest tests/unit -q
  integration_test: ./.venv/bin/pytest tests/integration -q
  e2e_test: ./.venv/bin/pytest tests/e2e -q
  ui_test: ./.venv/bin/pytest tests/e2e/ui -q
  coverage: ./.venv/bin/pytest --cov=src/opendocs --cov-report=term-missing
  fixture_generation: ./.venv/bin/python scripts/generate_fixture_corpus.py --profile acceptance
  acceptance: ./.venv/bin/python scripts/run_acceptance.py --suite full
  entry_cli: ./.venv/bin/python -m opendocs
  packaging: ./.venv/bin/pyinstaller packaging/opendocs.spec
stages:
- id: S0
  name: 项目脚手架与基线
  status: pending
  depends_on: []
  objective: 创建可运行仓库、基础依赖、目录骨架、开发脚本、最小入口与 CI 基线。
  implementation_basis: spec_first
  legacy_code_policy: reference_only_requires_refactor
  delivery_mode: refactor_against_legacy
  traceability:
  - FR-014
  - FR-016
  - NFR-017
  - NFR-019
  - NFR-020
  modules:
  - repo
  - config
  - logging
  - exceptions
  - cli
  - docs
  - ci
  deliverables:
  - README.md
  - pyproject.toml
  - src/opendocs/__init__.py
  - src/opendocs/__main__.py
  - src/opendocs/config/
  - src/opendocs/utils/
  - docs/adr/0001-baseline.md
  - scripts/bootstrap_dev.py
  - scripts/run_static_checks.py
  - tests/unit/test_smoke.py
  tasks:
  - id: S0-T01
    title: 初始化仓库目录与占位模块
    done_when:
    - 仓库结构满足主规范约束
    - 存在可导入的 src/opendocs 包
    - tests/ 与 scripts/ 目录齐备
  - id: S0-T02
    title: 建立 pyproject、开发依赖与静态检查配置
    done_when:
    - pip install -e .[dev] 可执行
    - pytest 可空跑
    - scripts/run_static_checks.py 可执行
  - id: S0-T03
    title: 建立配置加载、日志初始化、异常基类与应用入口
    done_when:
    - python -m opendocs 可启动最小 CLI 或空壳 UI
    - 默认配置路径可解析
    - 基础异常体系可复用
  - id: S0-T04
    title: 建立 README、开发引导与 ADR-0001
    done_when:
    - README 覆盖安装、运行、测试、目录结构
    - ADR 明确锁定技术栈与原因
  - id: S0-T05
    title: 建立最小 CI 与 smoke test
    done_when:
    - 至少有一个自动化 smoke test
    - CI 能完成安装、静态检查与测试
  test_commands:
  - ./.venv/bin/python scripts/bootstrap_dev.py
  - ./.venv/bin/python scripts/run_static_checks.py
  - ./.venv/bin/python -m opendocs --help
  - ./.venv/bin/pytest -q
  exit_criteria:
  - 本地可安装依赖
  - 静态检查命令可执行并通过
  - pytest 空跑成功
  - python -m opendocs 可启动
  - README 写清运行方式
  - 若存在旧实现，本阶段是否完成只看主规范、当前阶段门禁与 acceptance_refs，不看是否延续旧实现行为
  acceptance_refs: []
  risk_watch_items:
  - 不要在此阶段引入与 MVP 无关的大型框架
  - 避免把后续业务规则硬塞进基础设施层
- id: S1
  name: 领域模型与存储基线
  status: pending
  depends_on:
  - S0
  objective: 完成 SQLite 模式、ORM 模型、初始化与迁移工具、仓储层和样例数据脚本，并建立 SourceRoot 持久化基线与 Document/ScanRun 的引用完整性。
  implementation_basis: spec_first
  legacy_code_policy: reference_only_requires_refactor
  delivery_mode: refactor_against_legacy
  traceability:
  - FR-013
  - FR-014
  - NFR-011
  - NFR-017
  modules:
  - domain
  - storage
  - repositories
  - migration
  - seed
  deliverables:
  - src/opendocs/domain/models.py
  - src/opendocs/storage/db.py
  - src/opendocs/storage/schema/
  - src/opendocs/storage/repositories/
  - src/opendocs/storage/repositories/source_repository.py
  - scripts/init_db.py
  - scripts/seed_demo_data.py
  - tests/unit/storage/
  tasks:
  - id: S1-T01
    title: 建立核心领域模型与存储表
    done_when:
    - SourceRoot、Document、Chunk、KnowledgeItem、RelationEdge、TaskEvent、MemoryItem、FileOperationPlan、AuditLog 与主规范对齐
    - Document.source_root_id 与后续 ScanRun.source_root_id 的引用完整性在 schema 层可表达
    - 关键约束可在 ORM 或服务层表达
  - id: S1-T02
    title: 建立数据库初始化、迁移与连接管理
    done_when:
    - 可在新目录下初始化数据库
    - 迁移脚本可重复执行
    - SourceRoot 基线表与外键约束能安全初始化
  - id: S1-T03
    title: 建立仓储接口与基础 CRUD
    done_when:
    - 核心实体与 SourceRoot 基线对象可增删改查
    - 查询接口可供后续应用服务复用
  - id: S1-T04
    title: 建立 seed 数据脚本与最小查询演示
    done_when:
    - seed 后可得到可测试实体
    - seed/fixture 不再依赖任意占位 source_root_id
    - 样例数据可被单测与集成测试复用
  - id: S1-T05
    title: 补齐 CRUD、迁移与事务回滚测试
    done_when:
    - 核心存储测试通过
    - 失败事务不会污染主库
  test_commands:
  - ./.venv/bin/python -c "from pathlib import Path; Path('.tmp/opendocs.db').unlink(missing_ok=True)"
  - ./.venv/bin/python scripts/init_db.py --db-path .tmp/opendocs.db
  - ./.venv/bin/python scripts/seed_demo_data.py --db-path .tmp/opendocs.db
  - ./.venv/bin/pytest tests/unit/storage -q
  exit_criteria:
  - 可初始化数据库
  - SourceRoot 持久化基线与 source_root 引用完整性成立
  - 可写入/查询核心实体
  - 自动化测试覆盖 CRUD 与迁移
  - 若存在旧实现，本阶段是否完成只看主规范、当前阶段门禁与 acceptance_refs，不看是否延续旧实现行为
  acceptance_refs: []
  risk_watch_items:
  - 不要把业务逻辑放进 UI 或脚本层
  - 注意 SQLite FTS5 与常规表的同步策略
  - 只前移来源数据完整性，不提前把 S3 的来源管理与扫描行为搬进 S1
- id: S2
  name: 解析器与切片器
  status: completed
  depends_on:
  - S1
  objective: 支持 txt、md、docx、文字层 pdf 解析，并输出统一 ParsedDocument 与语义一致的标准 chunk。
  implementation_basis: spec_first
  legacy_code_policy: reference_only_requires_refactor
  delivery_mode: refactor_against_legacy
  traceability:
  - FR-001
  - FR-002
  - FR-015
  - NFR-006
  modules:
  - parsers
  - indexing/chunking
  - normalization
  deliverables:
  - src/opendocs/parsers/base.py
  - src/opendocs/parsers/txt_parser.py
  - src/opendocs/parsers/md_parser.py
  - src/opendocs/parsers/docx_parser.py
  - src/opendocs/parsers/pdf_parser.py
  - src/opendocs/indexing/chunker.py
  - tests/unit/parsers/
  tasks:
  - id: S2-T01
    title: 定义 parser 注册表、统一 ParsedDocument 模型与错误类型
    done_when:
    - 调用方无须关心具体文件类型
    - 解析失败能返回可审计错误对象
  - id: S2-T02
    title: 实现 txt、md、docx、pdf 解析器
    done_when:
    - 四类文件均可输出标准化文本与元数据
    - pdf 仅处理文字层并尽量保留页码
  - id: S2-T03
    title: 实现结构加语义联合切片
    done_when:
    - chunk 保留 char、page、paragraph、heading_path 定位
    - chunk 尽量保持单主题或单语义单元完整
    - 标题缺失或结构混乱时仍能基于段落与语义转折切分
    - 默认重叠比例落在 10%-15%
  - id: S2-T04
    title: 实现失败隔离、极短文档与破损文档处理
    done_when:
    - 单文件失败不拖垮批任务
    - parse_status 可区分 success、partial、failed
  - id: S2-T05
    title: 补齐解析正确性与切片边界测试
    done_when:
    - 四类解析器均有样例用例
    - chunk 定位字段可被断言
  test_commands:
  - ./.venv/bin/pytest tests/unit/parsers -q
  - ./.venv/bin/pytest tests/unit/indexing/test_chunker.py -q
  exit_criteria:
  - 四类文档均可解析
  - 失败文件不会拖垮批任务
  - chunk 保留定位信息且语义边界基本完整
  - 若存在旧实现，本阶段是否完成只看主规范、当前阶段门禁与 acceptance_refs，不看是否延续旧实现行为
  acceptance_refs:
  - TC-001
  - TC-002
  risk_watch_items:
  - 避免把解析逻辑与索引写入逻辑耦合
  - 不要退化成纯长度切块
  - 切片结果必须同时服务后续检索、问答、分类与生成
- id: S3
  name: 扫描、全量索引与增量更新
  status: completed
  depends_on:
  - S2
  objective: 建立 SourceRoot 管理、根目录扫描、ScanRun 持久化、全量索引、语义表示生成、监听增量更新、IndexArtifact 派生状态、重建幂等与失败重试闭环。
  implementation_basis: spec_first
  legacy_code_policy: reference_only_requires_refactor
  delivery_mode: refactor_against_legacy
  traceability:
  - FR-001
  - FR-002
  - NFR-002
  - NFR-010
  - NFR-011
  modules:
  - source_service
  - scan
  - indexing
  - watcher
  - fts
  - hnsw
  deliverables:
  - src/opendocs/app/source_service.py
  - src/opendocs/app/index_service.py
  - src/opendocs/indexing/scanner.py
  - src/opendocs/indexing/index_builder.py
  - src/opendocs/indexing/semantic_indexer.py
  - src/opendocs/indexing/watcher.py
  - tests/integration/indexing/
  tasks:
  - id: S3-T01
    title: 实现文档源配置、排除规则与 scan_run 记录
    done_when:
    - 可保存多个根目录配置
    - 扫描输出纳入、排除、失败统计
    - 生成可回查到 source_root_id 与 trace_id 的 scan_run 与审计记录
  - id: S3-T02
    title: 实现全量索引流水线
    done_when:
    - 首次全量索引可完成
    - 活跃 chunk 具备可追踪语义表示或显式降级标记
    - Document、Chunk、FTS5 与向量索引保持一致
    - IndexArtifact 能表达 dense 派生工件的 ready/stale/building/failed 状态
  - id: S3-T03
    title: 实现新增、修改、删除的增量同步与监听器
    done_when:
    - 文件变化后索引同步
    - 删除文件不再出现在活跃检索结果中
  - id: S3-T04
    title: 实现重建索引、故障恢复与幂等保护
    done_when:
    - 重建不产生脏重复数据
    - 失败后可重试且不污染已有索引
    - 当前语义模式、降级状态与 IndexArtifact 可被日志、状态查询或审计读取
  - id: S3-T05
    title: 补齐扫描与索引集成测试
    done_when:
    - 覆盖新增、修改、删除、排除规则、重建幂等
    - 覆盖语义表示刷新、IndexArtifact 状态、降级模式可见性与至少一组同义表达召回
    - 至少一组文件名不含核心词的样本可通过语义查询命中
  test_commands:
  - ./.venv/bin/pytest tests/integration/indexing -q
  - ./.venv/bin/python scripts/rebuild_index.py --source tests/fixtures/generated/corpus_main
  exit_criteria:
  - 初次全量索引可运行
  - 文件增删改后索引同步
  - 重建索引幂等
  - 语义索引模式可用，降级状态与 IndexArtifact 可见
  - 若存在旧实现，本阶段是否完成只看主规范、当前阶段门禁与 acceptance_refs，不看是否延续旧实现行为
  acceptance_refs:
  - TC-001
  - TC-002
  - TC-003
  - TC-004
  risk_watch_items:
  - 确保 FTS 与向量索引更新的一致性策略
  - 文件系统事件去抖动与重复事件处理
  - 不要把统计型 fallback 悄悄当成默认正常模式
- id: S4
  name: 混合检索与证据定位
  status: pending
  depends_on:
  - S3
  objective: 完成自然语言搜索、同义表达召回、过滤器、分数融合、证据引用结构、打开文件与片段定位，并让当前语义模式与检索降级状态可被最小展示壳确认。
  implementation_basis: spec_first
  legacy_code_policy: reference_only_requires_refactor
  delivery_mode: refactor_against_legacy
  traceability:
  - FR-003
  - FR-015
  - NFR-001
  - NFR-004
  modules:
  - retrieval
  - search_service
  - evidence_locator
  - cli_or_ui_shell
  deliverables:
  - src/opendocs/retrieval/search_pipeline.py
  - src/opendocs/retrieval/rerank.py
  - src/opendocs/retrieval/evidence.py
  - src/opendocs/app/search_service.py
  - tests/unit/retrieval/
  - tests/integration/search/
  tasks:
  - id: S4-T01
    title: 实现 FTS5 加 dense fusion 检索管线与查询语义理解
    done_when:
    - 支持 lexical_score、dense_score、freshness_boost 融合
    - 中文搜索与同义表达具备基本鲁棒性
    - 文件名不含项目名时仍可因正文语义被召回
  - id: S4-T02
    title: 实现目录、分类、标签、文件类型、时间、敏感级过滤器
    done_when:
    - 过滤器可组合使用
    - 过滤后仍返回可引用片段
  - id: S4-T03
    title: 实现统一引用结构、quote_preview 与源文件定位
    done_when:
    - 结果包含 path、page_or_paragraph、char_range、quote_preview
    - 至少能打开文件所在位置
  - id: S4-T04
    title: 实现 SearchService 与最小展示壳
    done_when:
    - CLI 或 UI 可展示标题、路径、摘要、时间、分数、引用
    - CLI 或 UI 至少能显示当前语义模式与是否处于统计 fallback
  - id: S4-T05
    title: 补齐黄金查询与相关性测试
    done_when:
    - Top10 命中率满足设定阈值
    - 无结果场景可稳定返回空结果
  test_commands:
  - ./.venv/bin/pytest tests/unit/retrieval -q
  - ./.venv/bin/pytest tests/integration/search -q
  exit_criteria:
  - 黄金查询集通过率达标
  - CLI 或 UI 可展示引用结果
  - 至少能打开文件所在位置
  - 中性命名文档可被语义查询召回
  - 若存在旧实现，本阶段是否完成只看主规范、当前阶段门禁与 acceptance_refs，不看是否延续旧实现行为
  acceptance_refs:
  - TC-005
  - TC-018
  risk_watch_items:
  - 不要只做纯向量或纯关键词检索
  - 引用对象必须可打开、可验证
  - 不要把关键词命中误报成语义理解
- id: S5
  name: 问答、摘要与洞察
  status: pending
  depends_on:
  - S4
  objective: 实现 RAG 问答、证据包、引用校验器、证据不足拒答、冲突检测、多文档摘要与洞察导出，并写入符合主规范的结构化 TaskEvent。
  implementation_basis: spec_first
  legacy_code_policy: reference_only_requires_refactor
  delivery_mode: refactor_against_legacy
  traceability:
  - FR-004
  - FR-005
