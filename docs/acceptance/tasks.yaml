- id: S8
  name: 记忆体系与冲突治理
  status: pending
  depends_on:
  - S7
  objective: 实现基于 TaskEvent 的 M0 运行时状态、M1/M2 持久化记忆、任务边界自动编码、后台整合、召回强化、衰减/硬上限、自动升级、冲突治理与审计。
  implementation_basis: spec_first
  legacy_code_policy: reference_only_requires_refactor
  delivery_mode: normal_spec_delivery
  traceability:
  - FR-008
  - FR-009
  - FR-010
  - NFR-012
  modules:
  - memory
  - conflict_resolution
  - context_budgeting
  deliverables:
  - src/opendocs/memory/service.py
  - src/opendocs/memory/policy.py
  - src/opendocs/qa/context_budget.py
  - tests/unit/memory/
  - tests/integration/memory/
  tasks:
  - id: S8-T01
    title: 实现 M0 运行时状态以及 M1、M2 持久化模型与服务
    done_when:
    - M0 仅会话有效不落盘
    - MemoryItem 仅允许 M1、M2
    - 持久化 MemoryItem.scope_type 仅允许 task、user
    - 持久化 MemoryItem 具备 source_event_ids、evidence_refs 与 promotion_state 契约
    - M1、M2 仅持久化结构化编码后的记忆
  - id: S8-T02
    title: 实现任务边界自动编码与启动、空闲后台整合
    done_when:
    - 问答、摘要、归档预览、归档执行、归档回滚、生成保存完成后仅基于已落盘 TaskEvent 自动产出 M1
    - 自动编码输入来自已落盘 TaskEvent、操作摘要与证据引用，而不是原始聊天全文
    - 自动编码结果至少能提炼出关注主题、偏好模式、任务状态快照中的一种结构化记忆
    - 启动或空闲整合时可去重、合并、更新状态并判断升级
  - id: S8-T03
    title: 实现衰减、30 天硬上限、召回强化与 M1 到 M2 自动升级
    done_when:
    - 记忆被召回并采用时自动刷新 recall_count、last_recalled_at 与衰减状态
    - M2 默认关闭
    - M2 开启后仅在满足主规范阈值时自动晋升
    - promotion_state 只允许 candidate、promoted 两种语义
    - 低于阈值的偏好以 candidate 形式持久化且不参与正常召回
    - 后台整合结果不会只是持续堆积条目，而是能把碎片记忆收敛成更高密度结果
  - id: S8-T04
    title: 实现记忆与文档证据冲突处理及上下文预算裁剪
    done_when:
    - 冲突时文档证据优先
    - 超预算时优先保留关键证据
  - id: S8-T05
    title: 实现记忆管理操作并补齐编码、整合、衰减与冲突测试
    done_when:
    - 删除、禁用、修正及 superseded 的旧记忆不可再被正常召回
    - 所有记忆操作有审计记录
  test_commands:
  - ./.venv/bin/pytest tests/unit/memory -q
  - ./.venv/bin/pytest tests/integration/memory -q
  exit_criteria:
  - 任务边界结束后自动生成 M1 结构化记忆
  - 用户不手工保存记忆时，系统仍能自动沉淀关注主题、偏好模式或任务状态快照
  - 数据库中不存在持久化的 M0 记录
  - MemoryItem.scope_type 仅允许 task、user
  - source_event_ids_json 可追溯到真实落盘的 TaskEvent
  - 启动或空闲整合后可去重、合并并更新状态
  - M2 默认关闭；开启后遵守主规范中的自动晋升与 candidate/promoted 规则
  - candidate、disabled、expired、superseded 记忆不可正常召回
  - 召回强化与 30 天硬上限生效
  - 冲突可定位和处理
  acceptance_refs:
  - TC-013
  - TC-014
  risk_watch_items:
  - 禁止让记忆覆盖文档证据
  - 避免将临时聊天上下文永久化
  - 禁止把自动编码退化成原样保存聊天记录
  - 禁止把记忆体系实现成需要用户手工维护的收藏夹
