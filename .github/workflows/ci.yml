name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python scripts/bootstrap_dev.py

      - name: CLI smoke
        run: python -m opendocs --help

      - name: CLI default start smoke
        run: python -m opendocs

      - name: Ruff lint
        run: ruff check .

      - name: Run tests
        run: pytest -q
