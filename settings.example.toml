# OpenDocs 配置示例（复制为 config/settings.toml 并按需修改）
# 默认配置路径：
#   Windows : %APPDATA%/OpenDocs/config/settings.toml
#   macOS   : ~/Library/Application Support/OpenDocs/config/settings.toml
#   Linux   : ~/.local/share/OpenDocs/config/settings.toml

[app]
language = "zh-CN"
output_dir = "OpenDocs_Output"

[index]
watch_changes = true
chunk_size_chars = 900
chunk_overlap_ratio = 0.12

[retrieval]
top_k = 12
fts_weight = 0.55
dense_weight = 0.35
freshness_weight = 0.10

[memory]
m1_ttl_days = 30
m2_enabled = false

[provider]
# Privacy mode: "local" (0 external calls), "hybrid" (local-first), "cloud"
default_mode = "local"
# LLM provider: mock, ollama, openai, anthropic, qwen, zhipu
llm_provider = "ollama"
embedding_provider = "local"
# Ollama endpoint (localhost, classified as LOCAL)
ollama_url = "http://localhost:11434"
# Cloud provider / model (only used when mode != local)
cloud_provider = "openai"
cloud_model = ""
# API keys are stored in OS keyring, never in this file.
